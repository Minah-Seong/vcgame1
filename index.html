<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Cloud Catch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrap">
    <div class="game-header">
      <h1>STAR CLOUD</h1>
      <p>Catch the falling stars!</p>
    </div>

    <div id="gameArea">
      <div class="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>TIME: <span id="timer">30</span></div>
        <div>GOAL: <span id="goal">200</span></div>
        <div>LEVEL: <span id="difficulty">2</span></div>
        <div>LIVES: <span id="life">❤❤❤</span></div>
      </div>

      <button id="soundToggleBtn" class="sound-toggle-btn" type="button" aria-pressed="true">SOUND ON</button>

      <div class="moon"></div>

      <div class="stars-bg star-1"></div>
      <div class="stars-bg star-2"></div>
      <div class="stars-bg star-3"></div>
      <div class="stars-bg star-4"></div>
      <div class="stars-bg star-5"></div>
      <div class="stars-bg star-6"></div>

      <div class="cloud-bg cloud-left"></div>
      <div class="cloud-bg cloud-right"></div>

      <div class="mountain mountain-back"></div>
      <div class="mountain mountain-front"></div>

      <div class="forest">
        <div class="tree tree-1"></div>
        <div class="tree tree-2"></div>
        <div class="tree tree-3"></div>
        <div class="tree tree-4"></div>
        <div class="tree tree-5"></div>
      </div>

      <div class="ground"></div>

      <div id="player"></div>

      <div id="resultPopup" class="result-popup hidden" aria-hidden="true">
        <div class="result-card">
          <div id="resultTitle" class="result-title">CLEAR</div>
          <div id="resultMessage" class="result-message">시간 안에 200점을 모았습니다!</div>
        </div>
      </div>
    </div>

    <p class="guide">← → 방향키를 누르고 있으면 계속 이동합니다</p>
    <p id="clearNote" class="sound-note">2단계: 30초 안에 200점 이상을 넘기면 CLEAR!</p>
    <p class="sound-note">노란 별 +10 · 붉은 별 +20 · 무지개 별 +50 · 운석 -50 / 목숨 -1</p>
    <p class="sound-note">START를 누르면 키치한 8비트 BGM이 재생됩니다</p>

    <div class="control-panel">
      <div class="main-buttons">
        <button id="startBtn">START</button>
        <button id="restartBtn">RESTART</button>
      </div>

      <div class="difficulty-panel" aria-label="난이도 선택">
        <button class="difficulty-btn" data-level="1" type="button">1단계</button>
        <button class="difficulty-btn active" data-level="2" type="button">2단계</button>
        <button class="difficulty-btn" data-level="3" type="button">3단계</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
